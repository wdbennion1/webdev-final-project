<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soccer Penalty Shootout</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #2d5a1b;
            font-family: sans-serif;
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        h1 { font-size: 28px; margin-bottom: 6px; text-shadow: 1px 1px 3px #000; }

        #scoreboard {
            display: flex;
            gap: 30px;
            margin-bottom: 14px;
            font-size: 18px;
            font-weight: bold;
        }

        #message {
            font-size: 20px;
            font-weight: bold;
            min-height: 28px;
            margin-bottom: 10px;
            text-shadow: 1px 1px 3px #000;
            color: #fff;
        }

        #field {
            width: 400px;
            height: 580px;
            background: linear-gradient(180deg, #4a8c2a 0%, #3d7a20 50%, #4a8c2a 100%);
            border: 4px solid white;
            position: relative;
            overflow: hidden;
            cursor: crosshair;
            border-radius: 4px;
            user-select: none;
        }

        #field.game-over { cursor: default; }

        #center-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.3);
            top: 50%;
        }

        #penalty-arc {
            position: absolute;
            width: 120px;
            height: 60px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: none;
            border-radius: 0 0 60px 60px;
            top: 130px;
            left: 50%;
            transform: translateX(-50%);
        }

        #penalty-box {
            position: absolute;
            width: 260px;
            height: 130px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top: none;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        #six-yard-box {
            position: absolute;
            width: 160px;
            height: 55px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top: none;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        #goal-posts {
            width: 220px;
            height: 80px;
            border: 5px solid white;
            border-top: none;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.08);
            z-index: 2;
        }

        #goal-posts::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                90deg, rgba(255,255,255,0.15) 0px, rgba(255,255,255,0.15) 1px, transparent 1px, transparent 22px
            ), repeating-linear-gradient(
                180deg, rgba(255,255,255,0.15) 0px, rgba(255,255,255,0.15) 1px, transparent 1px, transparent 22px
            );
        }

        #goalie {
            width: 44px;
            height: 44px;
            background: #e63946;
            border: 3px solid #c1121f;
            border-radius: 6px;
            position: absolute;
            top: 20px;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            line-height: 1;
        }

        #ball-canvas {
            position: absolute;
            z-index: 10;
            pointer-events: none;
        }

        #arrow-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9;
        }

        #power-bar-wrap {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 10px;
            background: rgba(0,0,0,0.35);
            border-radius: 5px;
            overflow: hidden;
            z-index: 12;
            display: none;
        }
        #power-bar-fill {
            height: 100%;
            width: 0%;
            border-radius: 5px;
            background: #2dc653;
            transition: background 0.1s;
        }

        /* End game overlay */
        #end-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.72);
            z-index: 20;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        #end-overlay.show { display: flex; }

        #end-title {
            font-size: 42px;
            font-weight: bold;
            text-shadow: 2px 2px 8px #000;
        }

        #end-summary {
            font-size: 18px;
            opacity: 0.9;
            text-shadow: 1px 1px 4px #000;
        }

        #try-again-btn {
            margin-top: 8px;
            padding: 12px 32px;
            background: #2dc653;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(0,0,0,0.4);
            transition: background 0.15s, transform 0.1s;
        }
        #try-again-btn:hover { background: #23a844; transform: scale(1.04); }
        #try-again-btn:active { transform: scale(0.97); }

        /* Shot tracker dots */
        #shot-tracker {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }

        .shot-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            border: 2px solid rgba(255,255,255,0.5);
            transition: background 0.2s;
        }
        .shot-dot.goal { background: #2dc653; border-color: #2dc653; }
        .shot-dot.miss { background: #e63946; border-color: #e63946; }

        .controls {
            margin-top: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .btn-row { display: flex; gap: 10px; }

        button, .nav-btn {
            padding: 9px 22px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        button { background: #e63946; color: white; }
        button:hover { background: #c1121f; }

        .nav-btn {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 2px solid rgba(255,255,255,0.4);
            transition: background 0.15s, border-color 0.15s;
        }
        .nav-btn:hover {
            background: rgba(255,255,255,0.28);
            border-color: rgba(255,255,255,0.75);
        }

        #hint { font-size: 13px; opacity: 0.75; margin-top: 2px; }
    </style>
</head>
<body>

    <h1>⚽ Penalty Shootout</h1>

    <div id="scoreboard">
        <span>Goals: <span id="goals">0</span></span>
        <span>Shots: <span id="shots">0</span> / 10</span>
        <span>Misses: <span id="misses">0</span></span>
    </div>

    <div id="shot-tracker">
        <!-- 10 dots injected by JS -->
    </div>

    <div id="message">Click &amp; drag to aim — release to shoot!</div>

    <div id="field">
        <div id="center-line"></div>
        <div id="penalty-arc"></div>
        <div id="penalty-box"></div>
        <div id="six-yard-box"></div>
        <div id="goal-posts"></div>
        <div id="goalie">🧤</div>
        <canvas id="ball-canvas"></canvas>
        <canvas id="arrow-canvas"></canvas>
        <div id="power-bar-wrap"><div id="power-bar-fill"></div></div>

        <!-- End game overlay inside field -->
        <div id="end-overlay">
            <div id="end-title"></div>
            <div id="end-summary"></div>
            <button id="try-again-btn" onclick="resetGame()">Try Again</button>
        </div>
    </div>

    <div class="controls">
        <div class="btn-row">
            <a href="scratchpage.html" class="nav-btn">← Interests Page</a>
            <a href="../index.html" class="nav-btn">← Main Page</a>
        </div>
    </div>
    <p id="hint">Drag further for more power</p>

    <script>
        const field      = document.getElementById('field');
        const goalie     = document.getElementById('goalie');
        const goalPosts  = document.getElementById('goal-posts');
        const msgEl      = document.getElementById('message');
        const goalsEl    = document.getElementById('goals');
        const shotsEl    = document.getElementById('shots');
        const missesEl   = document.getElementById('misses');
        const arrowCv    = document.getElementById('arrow-canvas');
        const actx       = arrowCv.getContext('2d');
        const ballCv     = document.getElementById('ball-canvas');
        const bctx       = ballCv.getContext('2d');
        const powerWrap  = document.getElementById('power-bar-wrap');
        const powerFill  = document.getElementById('power-bar-fill');
        const endOverlay = document.getElementById('end-overlay');
        const endTitle   = document.getElementById('end-title');
        const endSummary = document.getElementById('end-summary');
        const tracker    = document.getElementById('shot-tracker');

        arrowCv.width = 400; arrowCv.height = 580;

        const FIELD_W   = 400;
        const FIELD_H   = 580;
        const GOALIE_W  = 44;
        const GOALIE_H  = 44;
        const MAX_DRAG  = 180;
        const BASE_R    = 14;
        const MAX_SHOTS = 10;
        const MAX_MISSES = 3;
        const WIN_GOALS  = 7;

        let goals      = 0;
        let shots      = 0;
        let misses     = 0;
        let isShooting = false;
        let gameOver   = false;
        let goalieX    = (FIELD_W - GOALIE_W) / 2;
        let goalieDir  = 1;
        let goalieSpeed = 2.5;
        let dragActive = false;
        let dragStartX = 0, dragStartY = 0;
        let dragCurrX  = 0, dragCurrY  = 0;
        let animId     = null;
        let ballX      = FIELD_W / 2;
        let ballY      = FIELD_H - 40 - BASE_R;
        let ballAngle  = 0;

        // Build shot tracker dots
        const dots = [];
        for (let i = 0; i < MAX_SHOTS; i++) {
            const d = document.createElement('div');
            d.className = 'shot-dot';
            tracker.appendChild(d);
            dots.push(d);
        }

        // ── Soccer ball drawing ──────────────────────────────────────
        function drawSoccerBall(cx, cy, r, angle) {
            bctx.clearRect(0, 0, ballCv.width, ballCv.height);
            if (r < 4) return;

            bctx.save();
            bctx.translate(cx, cy);
            bctx.rotate(angle);

            bctx.beginPath();
            bctx.arc(0, 0, r, 0, Math.PI * 2);
            bctx.clip();

            bctx.fillStyle = '#ffffff';
            bctx.beginPath();
            bctx.arc(0, 0, r, 0, Math.PI * 2);
            bctx.fill();

            bctx.fillStyle = '#111111';
            bctx.strokeStyle = '#111111';
            bctx.lineWidth = Math.max(0.5, r * 0.06);
            bctx.lineJoin = 'round';

            function pentagon(px, py, pr, rot) {
                bctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const a = rot + (i * 2 * Math.PI / 5) - Math.PI / 2;
                    const x = px + pr * Math.cos(a);
                    const y = py + pr * Math.sin(a);
                    i === 0 ? bctx.moveTo(x, y) : bctx.lineTo(x, y);
                }
                bctx.closePath();
                bctx.fill();
                bctx.stroke();
            }

            const pr = r * 0.28;
            const od = r * 0.62;
            pentagon(0, 0, pr, 0);
            for (let i = 0; i < 5; i++) {
                const a  = (i * 2 * Math.PI / 5) - Math.PI / 2;
                pentagon(od * Math.cos(a), od * Math.sin(a), pr, a + Math.PI / 5);
            }

            bctx.restore();
            bctx.save();
            bctx.translate(cx, cy);
            bctx.beginPath();
            bctx.arc(0, 0, r, 0, Math.PI * 2);
            bctx.clip();

            const grad = bctx.createRadialGradient(-r*0.3, -r*0.3, r*0.05, 0, 0, r*1.1);
            grad.addColorStop(0,   'rgba(255,255,255,0.35)');
            grad.addColorStop(0.5, 'rgba(255,255,255,0)');
            grad.addColorStop(1,   'rgba(0,0,0,0.18)');
            bctx.fillStyle = grad;
            bctx.beginPath();
            bctx.arc(0, 0, r, 0, Math.PI * 2);
            bctx.fill();

            bctx.strokeStyle = '#333';
            bctx.lineWidth   = Math.max(1, r * 0.07);
            bctx.beginPath();
            bctx.arc(0, 0, r, 0, Math.PI * 2);
            bctx.stroke();

            bctx.restore();
        }

        function placeBall(x, y, r, angle) {
            ballX = x; ballY = y;
            const size = r * 2 + 4;
            ballCv.width  = size;
            ballCv.height = size;
            ballCv.style.left = (x - r - 2) + 'px';
            ballCv.style.top  = (y - r - 2) + 'px';
            drawSoccerBall(r + 2, r + 2, r, angle);
        }

        placeBall(FIELD_W / 2, FIELD_H - 40 - BASE_R, BASE_R, 0);

        // ── Goalie ───────────────────────────────────────────────────
        const GOALIE_MIN_X = 5;
        const GOALIE_MAX_X = FIELD_W - GOALIE_W - 5;

        function moveGoalie() {
            if (Math.random() < 0.02) goalieDir *= -1;
            if (Math.random() < 0.01) goalieSpeed = 1.5 + Math.random() * 3.5;
            goalieX += goalieDir * goalieSpeed;
            if (goalieX <= GOALIE_MIN_X) { goalieX = GOALIE_MIN_X; goalieDir =  1; }
            if (goalieX >= GOALIE_MAX_X) { goalieX = GOALIE_MAX_X; goalieDir = -1; }
            goalie.style.left = goalieX + 'px';
            requestAnimationFrame(moveGoalie);
        }
        moveGoalie();

        // ── Drag helpers ─────────────────────────────────────────────
        function getFieldPos(e) {
            const rect = field.getBoundingClientRect();
            const src  = e.touches ? e.touches[0] : e;
            return { x: src.clientX - rect.left, y: src.clientY - rect.top };
        }
        function dragVector() {
            return { dx: dragStartX - dragCurrX, dy: dragStartY - dragCurrY };
        }
        function dragPower() {
            const { dx, dy } = dragVector();
            return Math.min(Math.sqrt(dx*dx + dy*dy) / MAX_DRAG, 1.0);
        }

        // ── Arrow ────────────────────────────────────────────────────
        function drawArrow() {
            actx.clearRect(0, 0, arrowCv.width, arrowCv.height);
            if (!dragActive) return;

            const { dx, dy } = dragVector();
            const power = dragPower();
            const len   = Math.sqrt(dx*dx + dy*dy) || 1;
            const nx = dx/len, ny = dy/len;
            const ex = ballX + nx * power * 110;
            const ey = ballY + ny * power * 110;

            const r     = Math.round(power * 220);
            const g     = Math.round((1 - power) * 200 + 50);
            const color = `rgb(${r},${g},30)`;

            actx.strokeStyle = color;
            actx.lineWidth   = 3;
            actx.lineCap     = 'round';
            actx.setLineDash([6, 4]);
            actx.beginPath();
            actx.moveTo(ballX, ballY);
            actx.lineTo(ex, ey);
            actx.stroke();

            actx.setLineDash([]);
            const angle = Math.atan2(ey - ballY, ex - ballX);
            actx.beginPath();
            actx.moveTo(ex, ey);
            actx.lineTo(ex - 12*Math.cos(angle-0.4), ey - 12*Math.sin(angle-0.4));
            actx.lineTo(ex - 12*Math.cos(angle+0.4), ey - 12*Math.sin(angle+0.4));
            actx.closePath();
            actx.fillStyle = color;
            actx.fill();

            powerWrap.style.display = 'block';
            powerFill.style.width   = (power * 100) + '%';
            powerFill.style.background =
                power < 0.4 ? '#2dc653' : power < 0.75 ? '#ffd700' : '#e63946';
        }

        // ── Pointer events ───────────────────────────────────────────
        field.addEventListener('mousedown',  onDragStart);
        field.addEventListener('mousemove',  onDragMove);
        field.addEventListener('mouseup',    onDragEnd);
        field.addEventListener('mouseleave', onDragCancel);
        field.addEventListener('touchstart', onDragStart, { passive: false });
        field.addEventListener('touchmove',  onDragMove,  { passive: false });
        field.addEventListener('touchend',   onDragEnd);

        function onDragStart(e) {
            if (isShooting || gameOver) return;
            e.preventDefault();
            const pos  = getFieldPos(e);
            dragStartX = dragCurrX = pos.x;
            dragStartY = dragCurrY = pos.y;
            dragActive = true;
            drawArrow();
        }
        function onDragMove(e) {
            if (!dragActive || isShooting || gameOver) return;
            e.preventDefault();
            const pos = getFieldPos(e);
            dragCurrX = pos.x; dragCurrY = pos.y;
            drawArrow();
        }
        function onDragEnd(e) {
            if (!dragActive || isShooting || gameOver) return;
            dragActive = false;
            actx.clearRect(0, 0, arrowCv.width, arrowCv.height);
            powerWrap.style.display = 'none';
            const power = dragPower();
            if (power < 0.05) return;
            shoot(power);
        }
        function onDragCancel() {
            if (isShooting || gameOver) return;
            dragActive = false;
            actx.clearRect(0, 0, arrowCv.width, arrowCv.height);
            powerWrap.style.display = 'none';
        }

        // ── Shoot ────────────────────────────────────────────────────
        function shoot(power) {
            isShooting = true;
            shots++;
            shotsEl.textContent = shots;
            msgEl.textContent   = '';

            const { dx, dy } = dragVector();
            const len = Math.sqrt(dx*dx + dy*dy) || 1;
            const nx  = dx/len, ny = dy/len;

            const travelDist = power * 520;
            let targetX = ballX + nx * travelDist;
            let targetY = ballY + ny * travelDist;
            targetX = Math.max(5, Math.min(FIELD_W - 5, targetX));
            targetY = Math.max(5, Math.min(FIELD_H - 5, targetY));

            const savedGoalieLeft = goalieX;
            const startX = ballX, startY = ballY;
            const durationMs = 300 + (1 - power) * 350;
            const startTime  = performance.now();
            const spinSpeed  = power * 0.18;

            function animStep(now) {
                const t    = Math.min((now - startTime) / durationMs, 1.0);
                const ease = t * t;
                const cx   = startX + (targetX - startX) * ease;
                const cy   = startY + (targetY - startY) * ease;
                const distFactor  = cy / FIELD_H;
                const r = Math.max(5, Math.round(BASE_R * (0.4 + 0.6 * distFactor)));
                ballAngle += spinSpeed;
                placeBall(cx, cy, r, ballAngle);
                if (t < 1.0) {
                    animId = requestAnimationFrame(animStep);
                } else {
                    ballX = targetX; ballY = targetY;
                    checkResult(targetX, targetY, savedGoalieLeft);
                }
            }
            animId = requestAnimationFrame(animStep);
        }

        // ── Result ───────────────────────────────────────────────────
        function checkResult(targetX, targetY, savedGoalieLeft) {
            const goalRect  = goalPosts.getBoundingClientRect();
            const fieldRect = field.getBoundingClientRect();

            const goalLeft   = goalRect.left   - fieldRect.left;
            const goalRight  = goalRect.right  - fieldRect.left;
            const goalTop    = goalRect.top    - fieldRect.top;
            const goalBottom = goalRect.bottom - fieldRect.top;

            const gLeft   = savedGoalieLeft;
            const gRight  = savedGoalieLeft + GOALIE_W;
            const gTop    = 20;
            const gBottom = gTop + GOALIE_H;

            const inGoal =
                targetX >= goalLeft  && targetX <= goalRight &&
                targetY >= goalTop   && targetY <= goalBottom;

            const hitGoalie =
                targetX >= gLeft  && targetX <= gRight &&
                targetY >= gTop   && targetY <= gBottom;

            let scored = false;
            if (inGoal && !hitGoalie) {
                scored = true;
                goals++;
                goalsEl.textContent = goals;
                showMessage('⚽ GOAL!', '#2dc653');
            } else if (hitGoalie && inGoal) {
                showMessage('🧤 SAVED!', '#e63946');
            } else {
                showMessage('❌ Miss!', '#ffd700');
            }

            if (!scored) {
                misses++;
                missesEl.textContent = misses;
            }

            // Update tracker dot
            const dotIndex = shots - 1;
            if (dotIndex < MAX_SHOTS) {
                dots[dotIndex].classList.add(scored ? 'goal' : 'miss');
            }

            // Check early loss: can't recover even with remaining shots
            const shotsLeft = MAX_SHOTS - shots;
            const canStillWin = (goals + shotsLeft) >= WIN_GOALS;

            setTimeout(() => {
                if (misses > MAX_MISSES) {
                    endGame(false);
                } else if (shots >= MAX_SHOTS) {
                    endGame(goals >= WIN_GOALS);
                } else if (!canStillWin) {
                    endGame(false);
                } else {
                    resetBall();
                }
            }, 950);
        }

        function showMessage(text, color) {
            msgEl.textContent = text;
            msgEl.style.color = color;
        }

        function endGame(won) {
            gameOver = true;
            field.classList.add('game-over');
            endTitle.textContent   = won ? '🏆 You Win!' : '💀 You Lose!';
            endTitle.style.color   = won ? '#2dc653'     : '#e63946';
            endSummary.textContent = `${goals} goals scored out of ${shots} shots`;
            endOverlay.classList.add('show');
        }

        function resetBall() {
            if (animId) { cancelAnimationFrame(animId); animId = null; }
            ballAngle = 0;
            placeBall(FIELD_W / 2, FIELD_H - 40 - BASE_R, BASE_R, 0);
            isShooting = false;
            msgEl.textContent = 'Click & drag to aim — release to shoot!';
            msgEl.style.color = 'white';
        }

        function resetGame() {
            goals = 0; shots = 0; misses = 0; gameOver = false;
            goalsEl.textContent  = '0';
            shotsEl.textContent  = '0';
            missesEl.textContent = '0';
            dots.forEach(d => d.className = 'shot-dot');
            endOverlay.classList.remove('show');
            field.classList.remove('game-over');
            resetBall();
        }
    </script>
</body>
</html>
